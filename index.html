<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Badminton Racket Stringing Queue Management</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Badminton Racket Stringing Queue Management</h1>
    </header>
    <main>
        <section id="queue">
            <h2>Current Queue</h2>
            <ul id="queue-list">
                <!-- Queue items will go here -->
            </ul>
        </section>
        <section id="add-stringing">
            <h2>Add Racket to Queue</h2>
            <form id="add-form">
                <input type="text" id="racket-name" placeholder="Enter Racket Name" required>
                <input type="text" id="player-name" placeholder="Enter Player Name" required>
                <button type="submit">Add to Queue</button>
            </form>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
