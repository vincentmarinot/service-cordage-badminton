<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Service Cordage Badminton</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body>

<header class="hero">
<h1>🏸 Service Cordage Badminton</h1>
<p>Déposez votre raquette et consultez la file d’attente en direct</p>
</header>

<main class="container">

<section class="card">

<h2>Déposer une raquette</h2>

<form id="add-form" class="form-grid">

<div class="field full">
<label>Nom du joueur</label>
<input id="player-name" required>
</div>

<div class="field">
<label>Raquette</label>
<input id="racket-name" required>
</div>

<div class="field">
<label>Cordage</label>

<select id="string-type">
<option>BG65</option>
<option>BG80</option>
<option>BG80 Power</option>
<option>Aerobite</option>
<option>Exbolt 63</option>
<option>Exbolt 65</option>
<option>Autre</option>
</select>

</div>

<div class="field">
<label>Tension (kg)</label>
<input id="tension" type="number" step="0.5" required>
</div>

<div class="field">
<label>Prix (€)</label>
<input id="price" type="number" value="20">
</div>

<div class="field full">
<label>Commentaire</label>
<textarea id="comment" placeholder="Demande particulière"></textarea>
</div>

<div class="field checkbox-field full">
<label class="checkbox-label">
<input id="priority" type="checkbox">
Priorité match
</label>
</div>

<button class="primary-btn full">Ajouter</button>

</form>

</section>

<section class="card">

<div class="queue-header">
<h2>File d’attente</h2>
<div id="queue-count">0</div>
</div>

<ul id="queue-list"></ul>

<div id="queue-empty">Aucune raquette</div>

</section>

<section class="card">

<button id="cordeur-btn" class="secondary-btn">
Espace cordeur
</button>

<div id="cordeur-panel" class="hidden">

<h2>Stats</h2>

<div class="stats-grid">

<div class="stat-card">
<div class="stat-title">Raquettes aujourd’hui</div>
<div id="stat-rackets-today" class="stat-value">0</div>
</div>

<div class="stat-card">
<div class="stat-title">Revenus aujourd’hui</div>
<div id="stat-income-today" class="stat-value">0€</div>
</div>

<div class="stat-card">
<div class="stat-title">Revenus tournoi</div>
<div id="stat-income-total" class="stat-value">0€</div>
</div>

<div class="stat-card">
<div class="stat-title">Cordage le + utilisé</div>
<div id="stat-top-string" class="stat-value">-</div>
</div>

</div>

<ul id="cordeur-list"></ul>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
